name: Test
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        go: [ "oldstable", "stable" ]
        platform: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version: ${{ matrix.go }}
      - name: Vet
        run: go vet ./...
      - name: Run tests
        run: go test -race -timeout 10m ./...
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version: 'stable'
      - name: Run coverage
        run: |
          go test -coverprofile=cov.out -covermode=atomic ./...
          go tool cover -func=cov.out | tail -1
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version: 'stable'
      - name: Fuzz backup name parser (short)
        run: go test -run=^$ -fuzz=FuzzParseBackupName -fuzztime=30s .
      - name: Fuzz stamp round-trip (short)
        run: go test -run=^$ -fuzz=FuzzStampRoundTrip -fuzztime=30s .
